<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', 'Times New Roman', serif; font-size: 11pt; color: #1a1a1a; line-height: 1.7; }
  .page { max-width: 720px; margin: 0 auto; padding: 48px; }
  .header { border-bottom: 2px solid #334155; padding-bottom: 16px; margin-bottom: 32px; }
  .kit-label { font-size: 9pt; letter-spacing: 2px; text-transform: uppercase; color: #64748b; font-family: Arial, sans-serif; }
  .job-info { font-size: 13pt; font-weight: bold; color: #1e293b; margin-top: 6px; }
  .content { font-size: 11pt; }
  .content p { margin-bottom: 1em; }
  .content h1, .content h2 { color: #1e293b; margin: 1.2em 0 0.5em; }
  .content ul, .content ol { margin: 0.5em 0 1em 1.5em; }
  .content li { margin-bottom: 0.3em; }
  .content strong { color: #0f172a; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="kit-label">Cover Letter</div>
    <div class="job-info">{{ title }}{% if company %} — {{ company }}{% endif %}</div>
  </div>
  <div class="content">{{ content }}</div>
</div>
</body>
</html>
