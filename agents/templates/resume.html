<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    font-size: 10.5pt;
    color: #1a1a1a;
    line-height: 1.45;
    background: #fff;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 44px 44px;
  }

  /* ── Candidate name (h1) ── */
  .content h1 {
    font-size: 24pt;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
    border: none;
    padding: 0;
    line-height: 1.1;
  }

  /* Contact line — the <p> immediately after <h1> */
  .content h1 + p {
    font-size: 9pt;
    color: #475569;
    margin-bottom: 0;
    padding-bottom: 12px;
    border-bottom: 2.5px solid #2563eb;
    line-height: 1.6;
  }

  /* ── Section headers (h2) ── */
  .content h2 {
    font-size: 9.5pt;
    font-weight: 700;
    color: #2563eb;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin: 16px 0 5px;
    padding-bottom: 3px;
    border-bottom: 1px solid #bfdbfe;
  }

  /* ── Role / institution header (h3) ── */
  .content h3 {
    font-size: 10.5pt;
    font-weight: 700;
    color: #0f172a;
    margin: 10px 0 3px;
    line-height: 1.3;
  }

  /* ── Body text ── */
  .content p {
    margin-bottom: 0.55em;
    font-size: 10.5pt;
  }

  /* Skills groups — bold label inside paragraph */
  .content h2 + p,
  .content h2 + p + p {
    font-size: 10pt;
    margin-bottom: 0.3em;
    color: #1e293b;
  }

  /* ── Bullet lists ── */
  .content ul {
    margin: 3px 0 6px 16px;
    list-style: disc;
  }
  .content li {
    font-size: 10pt;
    margin-bottom: 2px;
    line-height: 1.4;
    color: #1e293b;
  }

  /* ── Horizontal rule (section divider) ── */
  .content hr {
    border: none;
    border-top: 1px solid #e2e8f0;
    margin: 6px 0 4px;
  }

  /* ── Inline bold ── */
  .content strong {
    font-weight: 700;
    color: #0f172a;
  }

  /* Skills category labels */
  .content p strong:first-child {
    color: #1d4ed8;
  }

  @media print {
    body { font-size: 10pt; }
    .page { padding: 0; }
    .content h2 { page-break-after: avoid; }
    .content h3 { page-break-after: avoid; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="content">{{ content }}</div>
</div>
</body>
</html>
