<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 10.5pt; color: #1a1a1a; line-height: 1.6; }
  .page { max-width: 720px; margin: 0 auto; padding: 44px; }
  .header { background: #f0f9ff; border-left: 4px solid #0ea5e9; padding: 16px 20px; margin-bottom: 32px; border-radius: 0 6px 6px 0; }
  .kit-label { font-size: 8pt; letter-spacing: 2px; text-transform: uppercase; color: #0369a1; }
  .job-info { font-size: 13pt; font-weight: bold; color: #0c4a6e; margin-top: 4px; }
  .content h2 { font-size: 12pt; color: #0369a1; background: #f0f9ff; padding: 10px 14px; border-radius: 4px; margin: 20px 0 8px; }
  .content h3 { font-size: 11pt; color: #1e293b; margin: 12px 0 4px; }
  .content p { margin-bottom: 0.7em; }
  .content ul, .content ol { margin: 0.5em 0 0.8em 1.5em; }
  .content li { margin-bottom: 0.3em; }
  .content strong { color: #0c4a6e; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="kit-label">Interview Preparation</div>
    <div class="job-info">{{ title }}{% if company %} — {{ company }}{% endif %}</div>
  </div>
  <div class="content">{{ content }}</div>
</div>
</body>
</html>
