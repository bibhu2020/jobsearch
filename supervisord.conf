[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:gateway]
command=node /app/dist/main.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PORT="7860",AGENTS_URL="http://localhost:8000",NODE_ENV="production"

[program:agents]
command=uvicorn agents.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app"
