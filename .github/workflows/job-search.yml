name: Job Search Agent

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'ID of the user who triggered the search'
        required: true
      profile_summary:
        description: 'User profile summary for AI-powered job matching'
        required: false
        default: ''
      skills:
        description: 'JSON array of user skills'
        required: false
        default: '[]'
      experience:
        description: 'JSON array of recent roles (title + company)'
        required: false
        default: '[]'
      keywords:
        description: 'Optional keyword override (e.g. "Python engineer remote")'
        required: false
        default: ''
      location:
        description: 'Location or country preference (e.g. "United Kingdom")'
        required: false
        default: ''

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install .

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run job search agent
        run: python agents/run_search.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEARCH_RESULTS_PATH: search_results
          USER_ID: ${{ github.event.inputs.user_id }}
          PROFILE_SUMMARY: ${{ github.event.inputs.profile_summary }}
          SKILLS: ${{ github.event.inputs.skills }}
          EXPERIENCE: ${{ github.event.inputs.experience }}
          SEARCH_KEYWORDS: ${{ github.event.inputs.keywords }}
          SEARCH_LOCATION: ${{ github.event.inputs.location }}

      - name: Commit and push results
        run: |
          git config user.name "Linear Lantern Bot"
          git config user.email "bot@noreply.github.com"
          git add search_results/
          git diff --staged --quiet || (
            git commit -m "chore: job search results for user ${{ github.event.inputs.user_id }} $(date +%Y-%m-%d)"
            git push
          )
